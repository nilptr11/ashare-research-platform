[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "ashare-data-provider"
version = "0.1.0"
description = "A-share data provider and CLI for LLM and quant workflows."
readme = "README.md"
requires-python = ">=3.14"
authors = [
  { name = "Codex" }
]
dependencies = [
  "beautifulsoup4>=4.12",
  "tushare>=1.4.21",
  "akshare>=1.18.64",
  "pandas>=2.3.0"
]

[project.scripts]
ashare-data-provider = "ashare_data_provider.cli:main"
ashare = "ashare_data_provider.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
ashare_data_provider = ["interfaces.json", "api_defaults.json", "api_schemas.json", "known_issues.json", "recipes.json"]
