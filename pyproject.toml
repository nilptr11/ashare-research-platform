[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "tushare-fastcli"
version = "0.1.0"
description = "Index-driven Tushare CLI for LLM and quant workflows."
readme = "README.md"
requires-python = ">=3.14"
authors = [
  { name = "Codex" }
]
dependencies = [
  "beautifulsoup4>=4.12",
  "tushare>=1.4.21",
  "pandas>=1.5"
]

[project.scripts]
tushare-fastcli = "tushare_fastcli.cli:main"
tsfc = "tushare_fastcli.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
tushare_fastcli = ["interfaces.json", "api_defaults.json", "api_schemas.json", "known_issues.json", "recipes.json"]
